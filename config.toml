# pi-bar configuration
# Color values may be hex colors (#rrggbb) or references to other colors in this file.

[colors]
text_fg = "#cdd6f4"
model_bg = "#005b95"
thinking_bg = "#005b95"
lsp_bg = "#313244"
activity_bg = "#313244"
activity_fg = "#2dd4bf"
ok = "#006b1d"
warn = "#a17a00"
alert = "#972e2d"


# Status bar layout is fully dynamic. Add, remove, reorder, or duplicate segments.
# Supported segment types:
#   "value"    - renders eval (or empty_text) as a colored text segment.
#   "meter"    - evaluates to a number, renders text from eval/value, and colors via states.
#   "status"   - renders a keyed pi status only when that status is present.
#                Use key = "*" to render all statuses not handled by another status segment.
#   "activity" - renders tool/streaming activity using eval (or templates) and spinner settings.
# Common segment keys: fg, bg, eval, empty_text, show_if, min_width.
# Default separators use Powerline/Nerd Font glyphs. For plain terminals, use
# leading = "[" and trailing = "]" or set both to "".
# Missing colors use fallback bg/fg colors instead of breaking the bar.
# Status segments also use key plus states with name, match, eval, fg, bg.
# Status segment eval receives state.status.text and state.status.key.
# Meter segments may use value_eval for numeric state matching and eval for display text.
# Meter states support gt, gte, lt, lte, fg, bg and are matched in order.
# Activity segments support sources, eval/template, values, spinner, and min_duration_ms.
# eval/show_if JavaScript scope: segment, ctx, pi, state, model,
# humanReadable, lspTotalErrors, lspTotalWarnings, value (meter display text),
# and activity (activity segments only: source, spinner, tools, streaming, value).
[statusbar]

# default separators require a mono nerd font for your terminal
# see nerdfonts.com
[statusbar.separators]
leading = "\uE0BA"
trailing = "\uE0BC"

[[statusbar.segments]]
type = "value"
eval = "`\\u{F4BC} ${model?.id ?? segment.empty_text ?? ''}`"
empty_text = "no model"
fg = "text_fg"
bg = "model_bg"

[[statusbar.segments]]
type = "value"
eval = "pi.getThinkingLevel()"
show_if = "model?.reasoning"
fg = "text_fg"
bg = "thinking_bg"

[[statusbar.segments]]
type = "meter"
value_eval = "ctx.getContextUsage()?.percent ?? 0"
eval = "`${Math.round(value)}% of ${humanReadable(model?.contextWindow)}`"
fg = "text_fg"
states = [
  { gte = 75, bg = "alert" },
  { gte = 50, bg = "warn" },
  { gte = 0, bg = "ok" },
]

[[statusbar.segments]]
type = "status"
key = "whatsapp"
eval = "'  '"
fg = "text_fg"
states = [
  { name = "connected", match = "WhatsApp: Connected$", bg = "ok" },
  { name = "disconnected", match = "WhatsApp: Disconnected$", bg = "alert" },
  { name = "default", bg = "warn" },
]

[[statusbar.segments]]
type = "status"
key = "pi-lens-lsp"
eval = "' \\u{F0169} '"
fg = "text_fg"
states = [
  { name = "errors", match = "^LSP [0-9]+ errors?$", eval = "`  ${lspTotalErrors()} `", bg = "alert" },
  { name = "warnings", match = "^LSP [0-9]+ warnings?$", eval = "`  ${lspTotalWarnings()} `", bg = "warn" },
  { name = "active", match = "^LSP Active", bg = "ok" },
  { name = "inactive", match = "^LSP Inactive$", bg = "lsp_bg" },
  { name = "default", bg = "warn" },
]

[[statusbar.segments]]
type = "status"
key = "mcp"
eval = "` \\u{F06F3} ${(state.status?.text ?? '').match(/(\\d+\\/\\d+)/)?.[1] ?? ''} `"
fg = "text_fg"
states = [
  { name = "all_connected", match = "^MCP:\\s*(\\d+)\\/\\1\\s+servers?", bg = "ok" },
  { name = "none_connected", match = "^MCP:\\s*0\\/\\d+\\s+servers?", bg = "alert" },
  { name = "partial_connected", match = "^MCP:\\s*\\d+\\/\\d+\\s+servers?", bg = "warn" },
  { name = "connecting", match = "^MCP:\\s*connecting", eval = "' \\u{F06F3} MCP … '", bg = "warn" },
  { name = "default", eval = "' \\u{F06F3} MCP '", bg = "warn" },
]

# catch all for unspecified status keys
[[statusbar.segments]]
type = "status"
key = "*"
eval = "` ${state.status?.text ?? ''} `"
fg = "text_fg"
states = [{ name = "default", bg = "warn" }]

[[statusbar.segments]]
type = "activity"
fg = "activity_fg"
bg = "activity_bg"
min_width = 11
min_duration_ms = 1000
sources = ["tools", "streaming"]
eval = "`${activity.spinner} ${activity.value}`"
values = { tools = "{tools}", streaming = "working" }
spinner = { frames = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"], interval_ms = 100 }
